name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # nt-schemas' build.rs runs `gh release download` against the
      # private no-tickets-service repo to fetch the canonical schemas
      # bundle. GITHUB_TOKEN is scoped to this workflow's own repo and
      # 401s on the cross-repo private release call. SCHEMAS_READ_TOKEN
      # is a fine-grained PAT with Contents:Read on no-tickets-service.
      # See .github/workflows/release.yml header for the longer story.
      #
      # Without this env var, CI passes today only because Swatinem/
      # rust-cache caches the nt-schemas OUT_DIR. The first cache miss
      # (dep change, lockfile bump, runner image roll) 401s. Injecting
      # the PAT here makes the schemas fetch deterministic.
      GH_TOKEN: ${{ secrets.SCHEMAS_READ_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # ── GitHub Actions workflow lint ────────────────────────────
      # Catches workflow-expression syntax bugs, outdated action
      # references, and shell-injection patterns in `run:` blocks
      # before they hit a real release. Cheap (~5s); runs before
      # the heavier Rust/Node steps so an actionlint break fails CI
      # fast.
      #
      # shellcheck integration is disabled: release.yml is
      # autogenerated by cargo-dist and ships ~6 info/style-level
      # findings (SC2086/SC2129/SC2001) that the cargo-dist authors
      # accept by design. The header on release.yml documents the
      # "RE-APPLY THESE EDITS" maintenance burden — adding
      # shellcheck fixes there would make every `dist generate`
      # invocation an extra-painful merge. Workflow-expression and
      # action-reference checks (the primary actionlint value) stay
      # on.
      - name: Lint workflow files
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: false

      # ── Rust workspace — canonical product surface ──────────────
      # Run first so a Rust break fails CI fast; the TS SDK is a
      # smaller surface (markdown helpers + frontmatter parser) and
      # is unlikely to change without the Rust side also changing.

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      # ── TypeScript SDK — npm package surface ────────────────────
      # The npm package ships the markdown / frontmatter SDK only
      # (Phase 4 will add a thin spawn-based client per ADR-0003);
      # CI keeps it linted and tested so the SDK contract holds.

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test
