[package]
name = "nt-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "no-tickets CLI — Rust port (Phase 2/3 of cross-platform-cli-binary fix)"

[[bin]]
name = "nt"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
indexmap = { version = "2", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "rustls-tls-webpki-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["parsing"] }
tokio = { version = "1", features = ["macros", "rt"] }
url = "2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "process", "io-util", "sync", "time"] }
wiremock = "0.6"
