[package]
name = "nt-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "no-tickets CLI — Rust port (Phase 2/3 of cross-platform-cli-binary fix)"

[[bin]]
name = "nt"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
