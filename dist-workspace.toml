[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax).
# musl-only on Linux matches the fix doc: musl is the default static target;
# glibc is a future opt-in artifact, not a shipped-by-default duplicate.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Unix archive format. DO NOT change to `.tar.xz` for "better
# compression" without verifying `self_update` crate support: v0.42
# ships archive features for tar / gzip / zstd / zip only — there is
# NO `compression-xz` feature. cargo-dist's default `.tar.xz` made
# every Unix `no-tickets update` silently leave the raw archive at
# the binary path with the executable bit set, corrupting the install
# (see docs/fixes/self-update-broken-on-tar-xz.md). If you genuinely
# need xz some day, first add an xz-decompress step to nt-cli's
# `update` command path AND keep paired `archive-tar` /
# `compression-flate2` features in `crates/nt-cli/Cargo.toml` enabled
# until the crate's archive features are demonstrably matched. The
# install.sh / system-tar path autodetects compression and is
# unaffected.
unix-archive = ".tar.gz"
# Path that installers should place binaries in. ~/.local/bin works for
# non-Rust users (XDG-standard, on most modern shells' PATH); CARGO_HOME
# would only exist on machines that already have Rust installed.
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Homebrew tap to publish the generated formula to. Empty repo created at
# https://github.com/magic-ingredients/homebrew-tap; release workflow
# commits Formula/no-tickets.rb on every tag push using HOMEBREW_TAP_TOKEN.
publish-jobs = ["homebrew"]
tap = "magic-ingredients/homebrew-tap"
# PRs only run `dist plan` (cheap config validation) — never the build matrix.
pr-run-mode = "plan"
# CI workflow is hand-hardened beyond what `dist generate` produces (SHA-pinned
# actions, cargo-install bootstrap, PR path filter). Allow the dirty diff.
# NOTE: this also blocks `dist generate` from writing the CI file — to pick
# up cargo-dist config changes that affect the workflow (new publish jobs,
# target additions), temporarily comment this out, regenerate, re-apply the
# hardening edits inline, then restore.
allow-dirty = ["ci"]
